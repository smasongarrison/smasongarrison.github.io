<h2>Aids prevalence data</h2>

<h3>Description</h3>

<p>Number of aids cases and deaths for a 19-year period.
</p>


<h3>Usage</h3>

<pre>data(aids)</pre>


<h3>Format</h3>

<p>A data frame with 19 observations on the following 3 variables.
</p>

<dl>
<dt><code>year</code></dt><dd><p>a numeric vector</p>
</dd>
<dt><code>cases</code></dt><dd><p>a numeric vector</p>
</dd>
<dt><code>deaths</code></dt><dd><p>a numeric vector</p>
</dd>
</dl>



<h3>Examples</h3>

<pre>
data(aids)
</pre>
