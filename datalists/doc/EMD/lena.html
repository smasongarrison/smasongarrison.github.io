<h2>Gray Lena image</h2>

<h3>Description</h3>

<p>A 512x512 gray image of Lena.
</p>


<h3>Usage</h3>

<pre>
data(lena)
</pre>


<h3>Format</h3>

<p>A 512x512 matrix.
</p>


<h3>Examples</h3>

<pre>
data(lena)
image(lena, col=gray(0:100/100), axes=FALSE)
</pre>
